name: CI Checks (Backend)

# [CI-PIPELINE-FIX] Runs on every push/PR to main in the
# flywise-server (backend) repo. Just node --check on server.js —
# catches a syntax error (a stray bracket, an unclosed string) before
# Render tries to deploy it and the whole API goes down. No
# dependencies to install for this check; if the repo later grows a
# real test suite, add an `npm ci && npm test` step above this one.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check server.js syntax
        run: node --check server.js
